<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getDocs, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT",
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  let qaItems = [];
  let qaDocIds = [];

  // ✅ AUTO LOGIN IF TOKEN EXISTS
  window.onload = function () {
    const token = localStorage.getItem('admin_token');
    if (token) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadLeads();
    }
  };

  // 🔐 LOGIN
  window.doLogin = async function() {
    const pwd = document.getElementById('admin-pwd').value;

    const res = await fetch('/api/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem('admin_token', data.token);

      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';

      loadLeads();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  };

  // 🚪 LOGOUT
  window.doLogout = function() {
    localStorage.removeItem('admin_token');

    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  };

  // 📊 LOAD LEADS
  window.loadLeads = async function() {
    document.getElementById('leads-list').innerHTML = 'Loading...';

    const snap = await getDocs(query(collection(db, 'leads'), orderBy('createdAt', 'desc')));
    const leads = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    renderLeads(leads);
  };

  // ✅ FIXED markReplied (NO DUPLICATE)
  window.markReplied = async function(id) {
    await fetch('/api/update-lead', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': localStorage.getItem('admin_token')
      },
      body: JSON.stringify({ id })
    });

    document.getElementById('badge-' + id).textContent = 'Followed up';
  };

  // 💾 SAVE QA
  window.saveQa = async function() {
    const questions = document.querySelectorAll('.qa-item input');
    const answers   = document.querySelectorAll('.qa-item textarea');

    const items = Array.from(questions).map((q,i) => ({
      question: q.value.trim(),
      answer: answers[i].value.trim()
    })).filter(x => x.question && x.answer);

    await fetch('/api/save-qa', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': localStorage.getItem('admin_token')
      },
      body: JSON.stringify({ items })
    });

    alert('Saved!');
  };
</script>
